<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(33,38,162);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(84,155,230);stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gradient background -->
  <rect width="1200" height="630" fill="url(#grad)" />
  <!-- Icon centered, preserving square aspect ratio at 500x500 -->
  <image xlink:href="icon.svg" x="350" y="65" width="500" height="500" preserveAspectRatio="xMidYMid meet" />
</svg>
